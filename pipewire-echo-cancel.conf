# Acoustic Echo Cancellation for Omega-7
# ---------------------------------------
# The skull listens for its wake word ("Omega 7") even while it is talking, so it
# can be interrupted (barge-in). The mic, however, also hears the skull's own
# speaker — so when the skull says "Omega 7" (boot line, or referring to itself in
# the third person) it used to trigger its own wake word.
#
# This loads PipeWire's WebRTC echo canceller. It creates a virtual mic
# (echo_cancel.source) whose audio has the speaker signal subtracted, and a virtual
# output (echo_cancel.sink) that doubles as the AEC reference. The skull's own voice
# is cancelled out of the mic, but a human speaking over the top still comes
# through — so only YOU can trigger the wake word, even mid-speech.
#
# The C-Media USB sound card does both mic + speaker, so capture and playback share
# one clock (no drift) — the ideal case for AEC.
#
# Deploy to:  ~/.config/pipewire/pipewire.conf.d/echo-cancel.conf  on the Pi
# Then:       systemctl --user restart pipewire pipewire-pulse wireplumber
#             pactl set-default-sink echo_cancel.sink
#             pactl set-default-source echo_cancel.source

context.modules = [
  { name = libpipewire-module-echo-cancel
    args = {
      library.name = aec/libspa-aec-webrtc
      aec.args = {
        webrtc.extended_filter   = true
        webrtc.high_pass_filter  = true
        webrtc.noise_suppression = true
        webrtc.gain_control      = false   # the skull manages its own levels
        webrtc.voice_detection   = false
        webrtc.delay_agnostic    = true    # robust to playback latency drift
      }

      # ── Real hardware (C-Media USB sound card) ──────────────────────────────
      capture.props = {
        node.target = "alsa_input.usb-C-Media_Electronics_Inc._USB_Audio_Device-00.mono-fallback"
      }
      playback.props = {
        node.target = "alsa_output.usb-C-Media_Electronics_Inc._USB_Audio_Device-00.analog-stereo"
      }

      # ── Virtual nodes the app talks to ──────────────────────────────────────
      # priority.session is set high so WirePlumber auto-selects these as the
      # system default; the app uses MIC/OUTPUT = -1 (default), so it picks them
      # up with no config change.
      source.props = {
        node.name       = "echo_cancel.source"
        node.description = "Omega-7 Echo-Cancelled Mic"
        priority.session = 2000
      }
      sink.props = {
        node.name       = "echo_cancel.sink"
        node.description = "Omega-7 Echo-Cancelled Output"
        priority.session = 2000
      }
    }
  }
]
